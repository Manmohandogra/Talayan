<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talayan Festival</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fdf6ec;
    --fg: #2b1d0e;
    --accent: #d97b29;
    --accent-2: #7a9e5c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1c1508; --fg: #f3e9d7; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 2rem;
  }
  main { max-width: 720px; width: 100%; }
  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }
  .accent { color: var(--accent); }
  p.tagline {
    font-size: 1.1rem;
    opacity: 0.8;
    margin-bottom: 2rem;
  }
  .badge {
    display: inline-block;
    padding: 0.5rem 1.25rem;
    border-radius: 999px;
    border: 2px solid var(--accent-2);
    color: var(--accent-2);
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.85rem;
    opacity: 0.6;
  }
  .slideshow {
    position: relative;
    margin-top: 2.5rem;
    width: 100%;
    aspect-ratio: 3 / 2;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .slideshow img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .slideshow img.active { opacity: 1; }
  .slideshow-nav {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
  }
  .slideshow-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .slideshow-dot.active { background: #fff; }
</style>
</head>
<body>
  <main>
    <h1>Talayan <span class="accent">Festival</span></h1>
    <p class="tagline">A demo page confirming GitHub Pages is live for talayanfestival.com.</p>
    <span class="badge">Pages deployment: OK</span>

    <div class="slideshow" id="slideshow">
      <img src="images/gallery-1.jpg" alt="Musicians performing sitar and tabla on stage" class="active">
      <img src="images/gallery-2.jpg" alt="Musicians performing sitar and tabla on stage">
      <img src="images/gallery-3.jpg" alt="Vocalist singing into a microphone">
      <div class="slideshow-nav">
        <button class="slideshow-dot active" data-index="0" aria-label="Show photo 1"></button>
        <button class="slideshow-dot" data-index="1" aria-label="Show photo 2"></button>
        <button class="slideshow-dot" data-index="2" aria-label="Show photo 3"></button>
      </div>
    </div>

    <footer>talayanfestival.com &middot; site under construction</footer>
  </main>

  <script>
    (function () {
      var slideshow = document.getElementById('slideshow');
      var slides = slideshow.querySelectorAll('img');
      var dots = slideshow.querySelectorAll('.slideshow-dot');
      var current = 0;
      var intervalMs = 4000;
      var timer;

      function show(index) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = (index + slides.length) % slides.length;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      function next() { show(current + 1); }

      function startTimer() {
        clearInterval(timer);
        timer = setInterval(next, intervalMs);
      }

      dots.forEach(function (dot) {
        dot.addEventListener('click', function () {
          show(parseInt(dot.dataset.index, 10));
          startTimer();
        });
      });

      startTimer();
    })();
  </script>
</body>
</html>
