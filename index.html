<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talayan Festival</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fdf6ec;
    --fg: #2b1d0e;
    --accent: #d97b29;
    --accent-2: #7a9e5c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1c1508; --fg: #f3e9d7; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 2rem;
  }
  main { max-width: 640px; }
  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }
  .accent { color: var(--accent); }
  p.tagline {
    font-size: 1.1rem;
    opacity: 0.8;
    margin-bottom: 2rem;
  }
  .badge {
    display: inline-block;
    padding: 0.5rem 1.25rem;
    border-radius: 999px;
    border: 2px solid var(--accent-2);
    color: var(--accent-2);
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.85rem;
    opacity: 0.6;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-top: 2.5rem;
    text-align: left;
  }
  .gallery img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }
</style>
</head>
<body>
  <main>
    <h1>Talayan <span class="accent">Festival</span></h1>
    <p class="tagline">A demo page confirming GitHub Pages is live for talayanfestival.com.</p>
    <span class="badge">Pages deployment: OK</span>

    <div class="gallery">
      <img src="images/gallery-1.jpg" alt="Musicians performing sitar and tabla on stage" loading="lazy">
      <img src="images/gallery-2.jpg" alt="Musicians performing sitar and tabla on stage" loading="lazy">
      <img src="images/gallery-3.jpg" alt="Vocalist singing into a microphone" loading="lazy">
      <img src="images/gallery-4.jpg" alt="Drummer performing on stage" loading="lazy">
    </div>

    <footer>talayanfestival.com &middot; site under construction</footer>
  </main>
</body>
</html>
